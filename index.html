<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date - St. Tropez</title>
    <!-- Libreria de Estilos Pixel Art -->
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #212529;
            font-family: 'Press Start 2P', monospace;
            padding: 15px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 11px;
        }

        .game-container {
            max-width: 400px;
            width: 100%;
            min-height: 540px;

            /* Imagem de fundo estática */
            background-image: url('Designer (9).png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: #212529;
            padding: 25px 20px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        #game-flow {
            height: 100%;
            min-height: 490px;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            min-height: 490px;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        /* Burbujas orientadas a la izquierda (from-left) */
        .nes-balloon {
            background-color: rgba(255, 255, 255, 0.95) !important;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .nes-balloon::after {
            border-right-color: rgba(255, 255, 255, 0.95) !important;
        }

        .bottom-content-wrapper {
            margin-top: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .save-date-box {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 15px 10px;
            border: 3px double #212529;
            font-size: 11px;
            line-height: 1.6;
            margin-bottom: 15px;
            text-align: center;
        }

        .highlight-date {
            color: #b01e23;
            font-weight: bold;
            font-size: 12px;
            margin: 5px 0;
        }
    </style>
</head>

<body>

    <div class="game-container nes-container is-rounded">

        <div id="game-flow">

            <!-- PANTALLA 0: SELEÇÃO DE IDIOMA -->
            <div id="screen-idioma" class="screen active">
                <div class="nes-balloon from-left">
                    <p>Choose your language / Escolha o idioma / Elegí tu idioma:</p>
                </div>
                <div class="btn-container">
                    <button class="nes-btn is-primary" onclick="selectLanguage('es')">[ ESPAÑOL (ARG) ]</button>
                    <button class="nes-btn is-success" onclick="selectLanguage('pt')">[ PORTUGUÊS (BR) ]</button>
                    <button class="nes-btn is-warning" onclick="selectLanguage('en')">[ ENGLISH ]</button>
                </div>
            </div>

            <!-- PANTALLA 1: DIÁLOGO PARTE 1 -->
            <div id="screen-intro1" class="screen">
                <div class="nes-balloon from-left">
                    <p id="text-intro1"></p>
                </div>
                <div class="btn-container">
                    <button class="nes-btn is-primary" id="btn-next1" onclick="nextScreen('intro1', 'intro2')"></button>
                </div>
            </div>

            <!-- PANTALLA 2: DIÁLOGO PARTE 2 -->
            <div id="screen-intro2" class="screen">
                <div class="nes-balloon from-left">
                    <p id="text-intro2"></p>
                </div>
                <div class="btn-container">
                    <button class="nes-btn is-primary" id="btn-next2" onclick="nextScreen('intro2', 'intro3')"></button>
                </div>
            </div>

            <!-- PANTALLA 3: DIÁLOGO PARTE 3 -->
            <div id="screen-intro3" class="screen">
                <div class="nes-balloon from-left">
                    <p id="text-intro3"></p>
                </div>
                <div class="btn-container">
                    <button class="nes-btn is-primary" id="btn-next3" onclick="nextScreen('intro3', 'final')"></button>
                </div>
            </div>

            <!-- PANTALLA 4: SAVE THE DATE (FINAL) -->
            <div id="screen-final" class="screen">
                <div class="nes-balloon from-left">
                    <p id="text-final-intro"></p>
                </div>
                <div class="bottom-content-wrapper">
                    <div class="save-date-box" id="box-date">
                        <!-- Dinâmico -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const i18n = {
            es: {
                btnSiguiente: "[ SIGUIENTE ]",
                intro1: "Bonjour chéris! Un saludo desde la Costa Azul. Aquí me ven, disfrutando de la alta vida frente al Mediterráneo.",
                intro2: "Pero entre desfiles y copas de champagne, me enteré de una noticia verdaderamente exclusiva...",
                intro3: "¡Mis papás (Rodri y Caio) finalmente decidieron formalizar su unión y se van a casar! Una boda magnífica.",
                finalIntro: "Su presencia es de suma importancia para nuestra familia. Por favor, reserven esta distinguida fecha:",
                dateBox: "✨ SAVE THE DATE ✨<br><div class='highlight-date'>17 de de Abril de 2027</div>📍 Marina da Glória<br>🏙️ Rio de Janeiro<br><br>🥂 ¡Pronto recibirán la invitación oficial! 🐾"
            },
            pt: {
                btnSiguiente: "[ SEGUINTE ]",
                intro1: "Bonjour chéris! Saudações da Riviera Francesa. Aqui estou eu, desfrutando da alta sociedade frente ao Mediterrâneo.",
                intro2: "Mas entre um desfile de moda e uma taça de champagne, soube de uma notícia verdadeiramente exclusiva...",
                intro3: "Meus pais (Rodri e Caio) finalmente decidiram oficializar a sua união e vão casar! Um evento magnífico.",
                finalIntro: "A presença de vocês é de extrema importância para a nossa família. Por favor, reservem esta distinta data:",
                dateBox: "✨ SAVE THE DATE ✨<br><div class='highlight-date'>17 de Abril de 2027</div>📍 Marina da Glória<br>🏙️ Rio de Janeiro<br><br>🥂 Em breve vocês receberão o convite oficial! 🐾"
            },
            en: {
                btnSiguiente: "[ NEXT ]",
                intro1: "Bonjour chéris! Greetings from the French Riviera. Here I am, enjoying the high life by the Mediterranean.",
                intro2: "But between fashion shows and glasses of champagne, I found out some truly exclusive news...",
                intro3: "My dads (Rodri and Caio) have finally decided to formalize their union and are getting married! A magnificent event.",
                finalIntro: "Your presence is of the utmost importance to our family. Please, save this distinguished date:",
                dateBox: "✨ SAVE THE DATE ✨<br><div class='highlight-date'>April 17, 2027</div>📍 Marina da Glória<br>🏙️ Rio de Janeiro<br><br>🥂 Official invitation will follow shortly! 🐾"
            }
        };

        let currentLang = 'es';

        function selectLanguage(lang) {
            currentLang = lang;
            const t = i18n[lang];

            document.getElementById('text-intro1').innerText = t.intro1;
            document.getElementById('btn-next1').innerText = t.btnSiguiente;

            document.getElementById('text-intro2').innerText = t.intro2;
            document.getElementById('btn-next2').innerText = t.btnSiguiente;

            document.getElementById('text-intro3').innerText = t.intro3;
            document.getElementById('btn-next3').innerText = t.btnSiguiente;

            document.getElementById('text-final-intro').innerText = t.finalIntro;
            document.getElementById('box-date').innerHTML = t.dateBox;

            nextScreen('idioma', 'intro1');
        }

        function nextScreen(current, next) {
            document.getElementById(`screen-${current}`).classList.remove('active');
            document.getElementById(`screen-${next}`).classList.add('active');
        }
    </script>
</body>

</html>
